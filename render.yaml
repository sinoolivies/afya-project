services:
  - type: web
    name: afyacare-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://africare.vercel.app
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_PROVIDER
        value: gmail
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

  - type: web
    name: afyacare-ai-service
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: python3 -m ensurepip --upgrade && python3 -m pip install -r requirements.txt
    startCommand: python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: REQUEST_TIMEOUT_SECONDS
        value: 30
