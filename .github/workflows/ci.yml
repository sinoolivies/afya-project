name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      - run: npm ci
      - run: npm --prefix backend ci
      - run: for f in $(find backend/src -name '*.js'); do node --check "$f"; done

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r ai-service/requirements.txt
      - run: python -m py_compile ai-service/app/main.py ai-service/app/api/routers/chat.py ai-service/app/api/routers/health.py ai-service/app/agents/healthcare_agent.py ai-service/app/clients/node_api.py ai-service/app/core/config.py ai-service/app/schemas/chat.py ai-service/app/services/memory_service.py ai-service/app/services/model_factory.py ai-service/app/services/patient_intake_service.py ai-service/app/services/triage_service.py ai-service/app/tools/operational_tools.py
