name: CI and Render Deploy

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: afyacare-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Validate backend source syntax
        run: for f in $(find backend/src -name '*.js'); do node --check "$f"; done

      - name: Validate backend utility scripts
        run: for f in $(find backend/src/scripts -name '*.js'); do node --check "$f"; done

  ai_service:
    name: AI Service Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install AI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ai-service/requirements.txt

      - name: Compile AI service
        run: python -m py_compile $(find ai-service/app -name '*.py')

  render_preflight:
    name: Render Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Render blueprint exists
        run: test -f render.yaml

      - name: Show Render services
        run: |
          grep -n "name:" render.yaml
          grep -n "buildCommand:" render.yaml
          grep -n "startCommand:" render.yaml

  deploy_backend_render:
    name: Deploy Backend to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_BACKEND_DEPLOY_HOOK_URL != ''
    needs: [frontend, backend, ai_service, render_preflight]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

  deploy_ai_render:
    name: Deploy AI Service to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_AI_DEPLOY_HOOK_URL != ''
    needs: [frontend, backend, ai_service, render_preflight]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AI deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_AI_DEPLOY_HOOK_URL }}"
